name: Deploy Frontend
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            export HOME=/root
            export PM2_HOME=/root/.pm2
            cd /root/.openclaw/workspace/omilearn/app

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            npm ci --production=false

            # Clean old build & rebuild with production API URL
            rm -rf .next
            NEXT_PUBLIC_API_URL=https://api.omilearn.com npm run build

            # Restart app
            pm2 restart omilearn --update-env

            # Health check
            sleep 3
            curl -sf http://localhost:3005/ > /dev/null && echo "Deploy success!" || echo "Deploy failed!"
